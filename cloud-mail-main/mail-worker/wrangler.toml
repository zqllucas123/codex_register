name = "chatgpt-register-email"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"			#d1数据库绑定名默认不可修改
database_name = "cloud-mail-db"		#d1数据库名字
database_id = "c0180662-a7a8-4fa9-a7a1-1e5db0231710"		#d1数据库id

[[kv_namespaces]]
binding = "kv"			#kv绑定名默认不可修改
id = "59fc28f843794b03a581f0efb271fedd"					#kv数据库id

#[[r2_buckets]]
#binding = "r2"			#r2对象存储绑定名默认不可修改
#bucket_name = ""		#r2对象存储桶的名字

#[[send_email]]
#name = "email"			#CF发件, 配置后优先使用

[ai]
binding = "ai"

#[assets]
#binding = "assets"
#directory = "./dist"
#not_found_handling = "single-page-application"
#run_worker_first = true

[triggers]
crons = ["*/30 * * * *", "0 16 * * *"]	#每30分钟刷新分析缓存，每天晚上12点执行每日任务


[vars]
#ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
#analysis_cache = false			#是否开启分析数据缓存
#orm_log = false			#是否sql日志
domain = ["chatvista.online"]				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
admin = "admin@chatvista.online"				#管理员的邮箱	示例: admin@example.com
jwt_secret = "abc123"			#jwt令牌的密钥,随便填一串字符串

#[build]
#command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
